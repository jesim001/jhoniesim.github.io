<!DOCTYPE html>
<html lang="fr" data-current-lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jhoni eSIM | Portfolio</title>
  <meta name="description" content="Portfolio multilingue de Jhoni eSIM en français, anglais et espagnol." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121933;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: #f5f7ff;
      --muted: #b8c0e0;
      --accent: #4f8cff;
      --accent-2: #13c296;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 22px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(79,140,255,.18), transparent 28%),
        radial-gradient(circle at top left, rgba(19,194,150,.12), transparent 22%),
        linear-gradient(180deg, #0b1020 0%, #0c1225 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .container { width: min(var(--max), calc(100% - 2rem)); margin: 0 auto; }

    .nav {
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(11, 16, 32, 0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-wrap {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 78px; gap: 1rem;
    }
    .brand { font-weight: 800; font-size: 1.15rem; letter-spacing: .3px; }
    .brand span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: flex-end; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 1rem; color: var(--muted); font-size: .96rem; }
    .nav-links a:hover { color: var(--text); }

    .lang-switch {
      display: inline-flex; align-items: center; gap: .45rem; padding: .35rem;
      border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    }
    .lang-btn {
      border: none; background: transparent; color: var(--muted); padding: .48rem .72rem;
      border-radius: 999px; font: inherit; font-weight: 700; cursor: pointer; transition: .2s ease;
    }
    .lang-btn.active, .lang-btn:hover { background: rgba(255,255,255,.11); color: var(--text); }

    [data-lang], [data-lang-block] { display: none; }
    html[data-current-lang="fr"] [data-lang="fr"] { display: inline; }
    html[data-current-lang="en"] [data-lang="en"] { display: inline; }
    html[data-current-lang="es"] [data-lang="es"] { display: inline; }
    html[data-current-lang="fr"] [data-lang-block="fr"] { display: block; }
    html[data-current-lang="en"] [data-lang-block="en"] { display: block; }
    html[data-current-lang="es"] [data-lang-block="es"] { display: block; }

    .hero { padding: 4.8rem 0 3.5rem; }
    .hero-grid { display: grid; grid-template-columns: 1.25fr .85fr; gap: 2rem; align-items: center; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: .6rem; font-size: .92rem; color: #dbe7ff;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px; padding: .6rem .95rem; margin-bottom: 1rem;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(19,194,150,.15);
    }
    h1 { font-size: clamp(2.5rem, 6vw, 4.9rem); line-height: 1.02; margin: 0 0 1rem; letter-spacing: -0.03em; }
    .hero p { font-size: 1.08rem; color: var(--muted); max-width: 720px; margin: 0 0 1.6rem; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: .9rem; margin-bottom: 1.6rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .6rem; padding: .95rem 1.2rem;
      border-radius: 14px; font-weight: 700; transition: .22s ease; border: 1px solid transparent;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #7f6fff); color: white; box-shadow: 0 14px 30px rgba(79,140,255,.28); }
    .btn-primary:hover, .btn-secondary:hover { transform: translateY(-2px); }
    .btn-secondary { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.12); color: var(--text); }
    .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.4rem; }
    .stat, .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .stat { padding: 1rem; }
    .stat strong { display: block; font-size: 1.6rem; margin-bottom: .2rem; }
    .stat span { color: var(--muted); font-size: .92rem; }
    .hero-card { padding: 1.2rem; position: relative; overflow: hidden; }
    .hero-card::before {
      content: ""; position: absolute; inset: auto -40px -40px auto; width: 160px; height: 160px;
      border-radius: 50%; background: radial-gradient(circle, rgba(79,140,255,.35), transparent 65%);
    }
    .portrait {
      aspect-ratio: 4 / 4.4; border-radius: 20px; overflow: hidden;
      background: linear-gradient(135deg, rgba(79,140,255,.25), rgba(19,194,150,.12));
      border: 1px solid rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center;
    }
    .portrait img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .mini-tags, .chips { display: flex; flex-wrap: wrap; gap: .7rem; margin-top: 1rem; }
    .tag, .skill-chip {
      padding: .6rem .8rem; border-radius: 999px; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12); font-size: .86rem; color: #e6ebff;
    }
    section { padding: 1.4rem 0 1rem; }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 1rem; margin-bottom: 1.2rem; }
    .section-head h2 { font-size: clamp(1.7rem, 4vw, 2.5rem); margin: 0; letter-spacing: -0.02em; }
    .section-head p { margin: 0; color: var(--muted); max-width: 760px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.2rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
    .content-card, .timeline, .project-card, .contact-card { padding: 1.3rem; }
    .content-card h3, .timeline h3, .project-card h3 { margin: 0 0 .6rem; font-size: 1.15rem; }
    .content-card p, .timeline p, .project-card p, .contact-line { color: var(--muted); margin: 0; }
    .list { display: grid; gap: .55rem; padding-left: 1.1rem; margin: .9rem 0 0; color: #e9eeff; }
    .timeline .date { color: #9fb7ff; font-size: .9rem; font-weight: 700; margin-bottom: .55rem; display: inline-block; }
    .timeline .role { font-size: 1.1rem; font-weight: 700; margin-bottom: .2rem; }
    .timeline .org { color: #d7def8; margin-bottom: .7rem; font-weight: 600; }
    .project-card { display: flex; flex-direction: column; gap: .9rem; }
    .label {
      display: inline-block; width: fit-content; padding: .4rem .7rem; border-radius: 999px;
      background: rgba(79,140,255,.14); border: 1px solid rgba(79,140,255,.25); color: #cfe0ff;
      font-size: .82rem; font-weight: 700;
    }
    .media-box {
      min-height: 220px; display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 1rem; border-radius: 18px; background: linear-gradient(135deg, rgba(79,140,255,.18), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.1); color: var(--muted);
    }
    .contact-grid { display: grid; grid-template-columns: .95fr 1.05fr; gap: 1.2rem; }
    .contact-list, form { display: grid; gap: 1rem; margin-top: 1rem; }
    .contact-item {
      padding: 1rem; border-radius: 16px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    }
    input, textarea {
      width: 100%; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: var(--text);
      border-radius: 14px; padding: .95rem 1rem; font: inherit; outline: none;
    }
    input::placeholder, textarea::placeholder { color: #9da8c8; }
    textarea { min-height: 150px; resize: vertical; }
    .footer { padding: 2.2rem 0 3rem; color: var(--muted); }
    .footer-box { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; padding: 1.2rem 0 0; border-top: 1px solid rgba(255,255,255,.08); }

    @media (max-width: 980px) {
      .hero-grid, .grid-2, .grid-3, .contact-grid { grid-template-columns: 1fr; }
      .hero-stats { grid-template-columns: 1fr; }
      .nav-wrap { padding: .7rem 0; align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 640px) {
      .hero { padding-top: 3.4rem; }
      .section-head { align-items: start; flex-direction: column; }
      .nav-links { gap: .8rem; font-size: .9rem; }
      .btn { width: 100%; }
      .hero-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
