  <main>
    <section id="about">
      <div class="container">
        <div class="section-head">
          <div>
            <h2><span data-lang="fr">À propos</span><span data-lang="en">About</span><span data-lang="es">Acerca de</span></h2>
            <p data-lang-block="fr">Une présentation claire de mon profil, de ma mission et de la valeur que j’apporte.</p>
            <p data-lang-block="en">A clear presentation of my profile, mission, and the value I bring.</p>
            <p data-lang-block="es">Una presentación clara de mi perfil, mi misión y el valor que aporto.</p>
          </div>
        </div>
        <div class="grid-2">
          <article class="content-card card">
            <h3><span data-lang="fr">Qui je suis</span><span data-lang="en">Who I am</span><span data-lang="es">Quién soy</span></h3>
            <p data-lang-block="fr">Professionnel engagé dans les domaines de la technologie, de la formation, de l’innovation et du développement de projets utiles. Mon objectif est de transformer des idées concrètes en solutions accessibles, adaptées aux réalités africaines.</p>
            <p data-lang-block="en">I am a professional committed to technology, training, innovation, and the development of useful projects. My goal is to turn strong ideas into accessible solutions adapted to African realities.</p>
            <p data-lang-block="es">Soy un profesional comprometido con la tecnología, la formación, la innovación y el desarrollo de proyectos útiles. Mi objetivo es transformar ideas sólidas en soluciones accesibles adaptadas a las realidades africanas.</p>
          </article>
          <article class="content-card card">
            <h3><span data-lang="fr">Ma mission</span><span data-lang="en">My mission</span><span data-lang="es">Mi misión</span></h3>
            <p data-lang-block="fr">Développer des initiatives qui rendent la science, la technologie et l’innovation plus proches, plus utiles et plus accessibles, notamment pour les jeunes, les écoles et les communautés.</p>
            <p data-lang-block="en">To develop initiatives that make science, technology, and innovation closer, more useful, and more accessible, especially for young people, schools, and communities.</p>
            <p data-lang-block="es">Desarrollar iniciativas que hagan la ciencia, la tecnología y la innovación más cercanas, más útiles y más accesibles, especialmente para jóvenes, escuelas y comunidades.</p>
          </article>
        </div>
      </div>
    </section>

