          <a class="btn btn-secondary" href="#contact"><span data-lang="fr">Me contacter</span><span data-lang="en">Contact me</span><span data-lang="es">Contáctame</span></a>
        </div>

        <div class="hero-stats">
          <div class="stat card"><strong>10+</strong><span data-lang="fr">Projets et initiatives à fort potentiel</span><span data-lang="en">Projects and initiatives with strong potential</span><span data-lang="es">Proyectos e iniciativas con gran potencial</span></div>
          <div class="stat card"><strong>STEM</strong><span data-lang="fr">Éducation, innovation, Arduino, Raspberry Pi, IoT</span><span data-lang="en">Education, innovation, Arduino, Raspberry Pi, IoT</span><span data-lang="es">Educación, innovación, Arduino, Raspberry Pi, IoT</span></div>
          <div class="stat card"><strong>Afrique</strong><span data-lang="fr">Vision centrée sur l’impact local et durable</span><span data-lang="en">A vision focused on local and sustainable impact</span><span data-lang="es">Visión centrada en un impacto local y sostenible</span></div>
