  <header class="hero" id="home">
    <div class="container hero-grid">
      <div>
        <div class="eyebrow"><span class="dot"></span><span data-lang="fr">Innovation • Éducation • Technologie • Impact</span><span data-lang="en">Innovation • Education • Technology • Impact</span><span data-lang="es">Innovación • Educación • Tecnología • Impacto</span></div>
        <h1>
          <span data-lang="fr">Créer des solutions utiles pour l’Afrique avec la technologie.</span>
          <span data-lang="en">Building useful solutions for Africa through technology.</span>
          <span data-lang="es">Crear soluciones útiles para África con tecnología.</span>
        </h1>
        <p data-lang-block="fr">Je suis <strong>Jhoni eSIM</strong>, porteur de projets éducatifs et technologiques. J’interviens sur l’innovation, le numérique, l’IoT, la formation, les projets STEM/STEAM et le développement de solutions concrètes à fort impact social.</p>
        <p data-lang-block="en">I am <strong>Jhoni eSIM</strong>, a builder of educational and technology-driven projects. I work across innovation, digital tools, IoT, training, STEM/STEAM initiatives, and the development of practical solutions with strong social impact.</p>
        <p data-lang-block="es">Soy <strong>Jhoni eSIM</strong>, impulsor de proyectos educativos y tecnológicos. Trabajo en innovación, herramientas digitales, IoT, formación, iniciativas STEM/STEAM y en el desarrollo de soluciones concretas con fuerte impacto social.</p>

        <div class="hero-actions">
