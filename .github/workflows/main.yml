    <section id="projects">
      <div class="container">
        <div class="section-head">
          <div>
            <h2><span data-lang="fr">Projets</span><span data-lang="en">Projects</span><span data-lang="es">Proyectos</span></h2>
            <p data-lang-block="fr">Quelques initiatives fortes déjà présentes dans ton parcours.</p>
            <p data-lang-block="en">A few strong initiatives already present in your journey.</p>
            <p data-lang-block="es">Algunas iniciativas fuertes ya presentes en tu trayectoria.</p>
          </div>
        </div>
        <div class="grid-3">
          <article class="project-card card">
            <span class="label">Santé • IoT</span>
            <h3><span data-lang="fr">Appareil mobile de diagnostic multi-usage</span><span data-lang="en">Mobile multi-purpose diagnostic device</span><span data-lang="es">Dispositivo móvil de diagnóstico multiuso</span></h3>
            <p data-lang-block="fr">Concept d’un système portable basé sur Raspberry Pi, Arduino, SIMCOM et différents capteurs pour améliorer l’accès au diagnostic.</p>
            <p data-lang-block="en">Concept of a portable system based on Raspberry Pi, Arduino, SIMCOM, and multiple sensors to improve access to diagnostics.</p>
            <p data-lang-block="es">Concepto de un sistema portátil basado en Raspberry Pi, Arduino, SIMCOM y varios sensores para mejorar el acceso al diagnóstico.</p>
          </article>
          <article class="project-card card">
            <span class="label">Éducation • Africa</span>
            <h3><span data-lang="fr">Programme STEAM pour l’enseignement secondaire</span><span data-lang="en">STEAM program for secondary education</span><span data-lang="es">Programa STEAM para educación secundaria</span></h3>
